name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.VPS_APP_DIR }}
            git pull origin main

            # Build das imagens
            docker compose -f docker-compose.prod.yml build

            # Executa migrations (banco já rodando do deploy anterior)
            docker compose -f docker-compose.prod.yml run --rm migrate

            # Reinicia app e worker com as novas imagens
            docker compose -f docker-compose.prod.yml up -d app worker pnab-postgres pnab-redis

            # Limpa imagens antigas
            docker image prune -f
